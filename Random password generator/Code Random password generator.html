<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Генератор паролей</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 350px;
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #667eea;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #e0e4ff;
}

.password-box {
    margin-top: 15px;
    padding: 10px;
    background: #a1dbff;
    border-radius: 8px;
    word-break: break-all;
}

label {
    display: block;
    text-align: left;
}

</style>
</head>

<body>

<div class="container">
    <h1>🔐 Генератор паролей</h1>
    
    <input type="number" id="length" placeholder="Длина пароля" value="12">
    
    <label>
        <input type="checkbox" id="letters" checked>
        Буквы
    </label>

    <label>
        <input type="checkbox" id="numbers" checked>
        Цифры
    </label>

    <label>
        <input type="checkbox" id="symbols" checked>
        Символы
    </label>

    <button onclick="generatePassword()">Сгенерировать</button>

    <div class="password-box" id="password">
        Ваш пароль появится здесь
    </div>

</div>

<script>
function generatePassword() {
    const length = document.getElementById("length").value;
    const useLetters = document.getElementById("letters").checked;
    const useNumbers = document.getElementById("numbers").checked;
    const useSymbols = document.getElementById("symbols").checked;

    const letters = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const numbers = "0123456789";
    const symbols = "!@#$%^&*()_+{}[]<>?/";

    let chars = "";

    if (useLetters) chars += letters;
    if (useNumbers) chars += numbers;
    if (useSymbols) chars += symbols;

    let password = "";

    for (let i = 0; i < length; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
    }

    document.getElementById("password").textContent = password;
}
</script>

</body>
</html>
